<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fink - Home</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="logo-container">
    <img th:src="@{/images/fink-logo.png}" alt="Fink 🐦‍⬛">
</div>

<div class="container">
    <h1 th:text="'Välkommen, ' + ${user.username} + '!'"></h1>

    <div class="card">
        <a th:href="@{/birds/new}"><button>Lägg till ny fågelpost</button></a>
        <a th:href="@{/birds}"><button>Visa alla fåglar du sett</button></a>
        <form th:action="@{/logout}" method="post">
            <button type="submit">Logga ut</button>
        </form>
    </div>
</div>
</body>
</html>
