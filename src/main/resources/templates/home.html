<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fink - Home</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="center-page">

<div class="container">

    <!-- 🔵 PROFILBILD -->
    <div class="profile-wrapper">
        <img th:if="${user.profileImageName != null}"
             th:src="@{'/uploads/' + ${user.profileImageName}}"
             class="profile-image">

        <div th:if="${user.profileImageName == null}" class="profile-placeholder">
            🪶
        </div>
    </div>

    <h1 th:text="'Välkommen, ' + ${user.username} + '!'" ></h1>

    <!-- UPLOAD -->
    <form th:action="@{/profile/upload}" method="post" enctype="multipart/form-data">
        <input type="file" name="image" accept="image/*" required>
        <button type="submit">Ladda upp profilbild</button>
    </form>

    <div class="card">
        <a th:href="@{/birds/new}"><button>Lägg till ny fågelpost</button></a>
        <a th:href="@{/birds}"><button>Visa alla fåglar du sett</button></a>

        <form th:action="@{/logout}" method="post">
            <button type="submit">Logga ut</button>
        </form>
    </div>

</div>

</body>
</html>
