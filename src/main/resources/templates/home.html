<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fink - Home</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="center-page">

<div class="container">

    <div class="profile-wrapper">
        <img th:if="${user.profileImageName != null}"
             th:src="@{'/uploads/' + ${user.profileImageName}}"
             class="profile-image">

        <div th:if="${user.profileImageName == null}" class="profile-placeholder">
            🪶
        </div>
    </div>

    <h1 th:text="'Välkommen, ' + ${user.username} + '!'"></h1>

    <form th:action="@{/profile/upload}" method="post" enctype="multipart/form-data">
        <input type="file" name="image" accept="image/*" required>
        <button type="submit">Ladda upp profilbild</button>
    </form>

    <div class="card">
        <a th:href="@{/birds/new}"><button type="button">Lägg till ny fågelpost</button></a>
        <a th:href="@{/birds}"><button type="button">Visa alla fåglar du sett</button></a>
    </div>

    <div class="card" th:if="${!#lists.isEmpty(incomingRequests)}">
        <h2>Vänförfrågningar</h2>

        <ul>
            <li th:each="request : ${incomingRequests}">
                <span th:text="${request.sender.username}"></span>

                <form th:action="@{'/friends/accept/' + ${request.id}}" method="post">
                    <button type="submit">Acceptera</button>
                </form>
            </li>
        </ul>
    </div>



    <div class="card" th:if="${!#lists.isEmpty(friends)}">
        <h2>Mina vänner</h2>

        <ul>
            <li th:each="friendship : ${friends}">
                <span th:text="${friendship.sender.id == user.id ? friendship.receiver.username : friendship.sender.username}"></span>
            </li>
        </ul>
    </div>

    <div class="card" th:if="${!#lists.isEmpty(allUsers)}">
        <h2>Hitta användare</h2>

        <ul>
            <li th:each="otherUser : ${allUsers}">
                <span th:text="${otherUser.username}"></span>

                <form th:action="@{'/friends/request/' + ${otherUser.id}}" method="post">
                    <button type="submit">Lägg till vän</button>
                </form>
            </li>
        </ul>
    </div>

    <div class="card">
        <form th:action="@{/logout}" method="post">
            <button type="submit">Logga ut</button>
        </form>
    </div>

</div>

</body>
</html>
