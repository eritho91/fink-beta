<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fink - Dina fåglar</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<body>

<div class="container">
    <h1 th:text="'Fåglar som ' + ${user.username} + ' har sett:'"></h1>

    <ul>
        <li th:each="bird : ${birds}">
            <span th:text="${bird.species} + ' - ' + ${bird.location}"></span><br>
            <small th:text="${#temporals.format(bird.createdAt, 'yyyy-MM-dd HH:mm')}"></small>
        </li>    </ul>

    <div class="card">
        <a th:href="@{/birds/new}"><button>Lägg till ny fågelpost</button></a>
        <a th:href="@{/home}"><button>Tillbaka till hem</button></a>
    </div>
</div>
</body>
</html>
