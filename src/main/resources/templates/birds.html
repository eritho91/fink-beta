<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Fink - Dina fåglar</title>
</head>
<body>
<div class="container">
    <h1 th:text="'Fåglar som ' + ${user.username} + ' har sett:'"></h1>

    <ul>
        <li th:each="bird : ${birds}" th:text="${bird.species} + ' - ' + ${bird.location}"></li>
    </ul>

    <div class="card">
        <a th:href="@{/birds/new}"><button>Lägg till ny fågelpost</button></a>
        <a th:href="@{/home}"><button>Tillbaka till hem</button></a>
    </div>
</div>
</body>
</html>
